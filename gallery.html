<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>사진 갤러리 - 아깡이의 성장 일기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href='./style.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        <header>
            <h1>사진 갤러리 📸</h1>
            <a href="index.html">홈으로</a>
        </header>

        <section id="gallery-grid" class="gallery-grid-container">
            <!-- Images will be loaded here by gallery.js -->
        </section>
    </div>

    <!-- Modal for viewing full-size image -->
    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modal-image">
        <div id="modal-caption"></div>
    </div>

    <script type="module" src="https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js"></script>
    <script type="module" src="./gallery.js"></script>

</html>
