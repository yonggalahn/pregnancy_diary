<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아깡이를 기다리며 - 성장 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
  <div class="container">
    
    <!-- Top Navigation Header -->
    <header style="display: flex; justify-content: space-between; align-items: center; border: none; box-shadow: none; padding: 0 0 20px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 40px; border-radius: 0;">
      <h1 style="margin: 0; font-size: 1.8em; font-weight: 700; letter-spacing: -0.03em; color: var(--text-primary);">👶 아깡이의 성장 일기</h1>
      <div style="display: flex; gap: 10px;">
        <a href="archive.html" class="header-button" style="padding: 8px 16px; font-size: 0.95em; box-shadow: none;">모아보기 📚</a>
        <a href="search.html" class="header-button" style="padding: 8px 16px; font-size: 0.95em; box-shadow: none;">검색 🔍</a>
      </div>
    </header>

    <!-- Hero Section / D-Day Metric -->
    <div style="text-align: center; margin-bottom: 40px;">
      <div id="dday-counter"></div>
    </div>

    <!-- Weekly Information Dashboard Widget -->
    <section id="weekly-info-section" class="latest-diary-card" style="margin-bottom: 30px;">
      <h2 id="weekly-info-title" style="font-size: 1.6em; color: var(--text-primary); margin-bottom: 8px;"></h2>
      <p id="weekly-info-week" style="font-size: 0.95em; color: var(--text-secondary); margin-bottom: 20px; font-weight: 500;"></p>
      <div id="weekly-info-content"></div>
    </section>

    <!-- Mood Tracker Widget -->
    <section id="mood-tracker-section" class="latest-diary-card" style="margin-bottom: 30px;">
      <h2 style="font-size: 1.6em; color: var(--text-primary); margin-bottom: 15px; text-align: center;">오늘의 기분은 어때요?</h2>
      <div id="mood-user-selector" style="display: flex; justify-content: center; gap: 24px; margin-bottom: 20px;">
        <label style="cursor: pointer; color: var(--text-primary); font-weight: 500; display: flex; align-items: center; gap: 6px;">
          <input type="radio" name="mood-user" value="mikael" checked style="accent-color: var(--primary);"> 🧔 미카엘
        </label>
        <label style="cursor: pointer; color: var(--text-primary); font-weight: 500; display: flex; align-items: center; gap: 6px;">
          <input type="radio" name="mood-user" value="agatha" style="accent-color: var(--primary);"> 👩 아가다
        </label>
      </div>
      <div id="mood-buttons" style="display: flex; justify-content: center; gap: 15px; margin-bottom: 15px;">
        <button class="mood-button" data-mood="🥰">🥰</button>
        <button class="mood-button" data-mood="😊">😊</button>
        <button class="mood-button" data-mood="😐">😐</button>
        <button class="mood-button" data-mood="😢">😢</button>
        <button class="mood-button" data-mood="😠">😠</button>
      </div>
      <p id="todays-mood" style="text-align: center; font-size: 1em; font-weight: 500; margin-top: 15px; color: var(--text-secondary);"></p>
    </section>

    <!-- Biorhythm Dashboard Widget -->
    <section id="biorhythm-section" class="latest-diary-card" style="margin-bottom: 40px;">
      <h2 style="font-size: 1.6em; color: var(--text-primary); margin-bottom: 20px; text-align: center;">오늘의 부부 바이오리듬 🧬</h2>
      <div id="biorhythm-content">
          <!-- Biorhythm details will be loaded here by main.js -->
      </div>
    </section>

    <!-- Couple Profiles Section -->
    <main>
      <section class="profiles" style="margin-bottom: 40px;">
        <div class="profile">
          <a href="diary.html?person=mikael">
            <img id="mikael-pic" src="image/michael.jpg" alt="미카엘 사진">
            <span>미카엘의 일기 쓰기 ✍</span>
          </a>
        </div>
        <div class="profile">
          <a href="diary.html?person=agatha">
            <img id="agatha-pic" src="image/agatha.jpg" alt="아가다 사진">
            <span>아가다의 일기 쓰기 ✍</span>
          </a>
        </div>
      </section>
    </main>

    <!-- Calendar Overview -->
    <div id="main-calendar-container" style="margin-bottom: 40px;"></div>

    <!-- Latest Diaries Snippet Grid -->
    <section class="latest-diaries" style="margin-bottom: 40px;">
      <h2 style="font-size: 1.6em; color: var(--text-primary); margin-bottom: 20px;">최신 일기 미리보기</h2>
      <div class="latest-diaries-grid">
        <div id="latest-mikael-entry" class="latest-diary-card"></div>
        <div id="latest-agatha-entry" class="latest-diary-card"></div>
      </div>
    </section>

    <!-- Footer Navigation Links -->
    <section class="main-nav-links" style="display: flex; justify-content: center; gap: 20px;">
      <a href="archive.html" class="nav-button">
        일기와 사진 모아보기 📚
      </a>
      <a href="search.html" class="nav-button">
        일기 검색하기 🔍
      </a>
    </section>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script type="module" src="/firebase.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
